{% if show_search_guidance %}
<aside class="community-search-guidance" aria-label="راهنمای جستجو در انجمن">
  <div class="container">
    <div class="community-search-guidance__inner">
      <div class="community-search-guidance__text">
        <p class="community-search-guidance__lead mb-1">
          قبل از ایجاد بحث جدید، ابتدا در انجمن جستجو کنید.
        </p>
        <p class="community-search-guidance__hint mb-0">
          ممکن است پاسخ سؤال شما قبلاً توسط دیگران داده شده باشد.
        </p>
      </div>
      <form method="get" action="{% url 'community:search' %}" class="community-search-guidance__form" role="search">
        <label for="community-search-guidance-q" class="visually-hidden">جستجو در انجمن</label>
        <input
          type="search"
          name="q"
          id="community-search-guidance-q"
          class="form-control form-control-sm community-search-guidance__input"
          placeholder="جستجو در عنوان و متن بحث‌ها"
          autocomplete="off"
        />
        <button type="submit" class="btn btn-primary btn-sm community-search-guidance__submit">
          <i class="fas fa-search ms-1" aria-hidden="true"></i>جستجو در انجمن
        </button>
      </form>
    </div>
  </div>
</aside>
{% endif %}
