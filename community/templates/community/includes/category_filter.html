<div class="d-flex flex-wrap gap-2 mb-3">
  <a href="{% url 'community:discussion_list' %}"
     class="btn btn-sm {% if not selected_category %}btn-primary{% else %}btn-outline-primary{% endif %}">همه</a>
  {% for category in categories %}
  <a href="?category={{ category.slug }}&sort={{ sort }}&status={{ status }}"
     class="btn btn-sm {% if selected_category and selected_category.slug == category.slug %}btn-primary{% else %}btn-outline-primary{% endif %}">{{ category.name }}</a>
  {% endfor %}
</div>
