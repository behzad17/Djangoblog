{% load category_extras %}
<div class="ad-placeholder {{ extra_class|default:'' }}">
  <a
    href="{{ ad_url }}"
    target="_blank"
    rel="noopener noreferrer"
    class="ad-link"
  >
    <img
      src="{% homepage_static_ad_src ad_stem %}"
      alt="تبلیغات"
      class="ad-image"
      loading="eager"
      onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"
    />
    <div class="ad-content" style="display: none">
      <i class="fas fa-ad"></i>
      <p class="ad-text">Your Ads Here!</p>
    </div>
  </a>
</div>
