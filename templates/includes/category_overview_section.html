<div class="category-overview-section">
  <h3 class="category-section-title mb-3">
    <i class="fas fa-tags ms-2"></i>دسته بندی محتوا
  </h3>

  {% if category_overview_rows %}
    {% for category, latest_post in category_overview_rows %}
      {% include 'includes/category_overview_row.html' with category=category latest_post=latest_post %}
    {% endfor %}
  {% else %}
    <p class="text-muted text-center mb-0">هنوز دسته‌بندی‌ای در دسترس نیست.</p>
  {% endif %}
</div>
