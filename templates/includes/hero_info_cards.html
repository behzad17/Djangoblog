<!-- Desktop/Tablet informational cards (≥768px) — not CTAs -->
<div class="hero-info-cards-grid" role="list" aria-label="راهنمای استفاده از پیوند">
  <div class="hero-info-card hero-info-card--share" role="listitem">
    <span class="hero-info-card__icon" aria-hidden="true">
      <i class="fas fa-users"></i>
    </span>
    <p class="hero-info-card__title">تجربه‌ها و دانش خود را به اشتراک بگذارید</p>
  </div>

  <div class="hero-info-card hero-info-card--ask" role="listitem">
    <span class="hero-info-card__icon" aria-hidden="true">
      <i class="fas fa-question-circle"></i>
    </span>
    <p class="hero-info-card__title">سوالات خود را از متخصصین بپرسید</p>
  </div>

  <div class="hero-info-card hero-info-card--services" role="listitem">
    <span class="hero-info-card__icon" aria-hidden="true">
      <i class="fas fa-briefcase"></i>
    </span>
    <p class="hero-info-card__title">خدمات مورد نیاز خود را پیدا کنید</p>
  </div>

  <div class="hero-info-card hero-info-card--events" role="listitem">
    <span class="hero-info-card__icon" aria-hidden="true">
      <i class="fas fa-calendar-check"></i>
    </span>
    <p class="hero-info-card__title">رویدادها را دنبال کنید</p>
  </div>
</div>
